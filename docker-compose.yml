version: '3.8'

services:
   postgres:
     image: postgres:latest
     environment:
       POSTGRES_USER: user
       POSTGRES_PASSWORD: 123qwe
       POSTGRES_DB: wallets
       PGDATA: /var/lib/postgresql/data/pgdata
     ports:
       - "5432:5432"
     volumes:
       - ./pgdata:/var/lib/postgresql/data/pgdata

   app:
      build: .
      command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
      volumes:
      - .:/app
      ports:
         - "8000:8000"
      depends_on:
        - postgres